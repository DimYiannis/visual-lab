[build]
  command = "npm run generate"
  # Locally, `nuxi generate` writes to .output/public — but Nitro detects the
  # NETLIFY env var during Netlify's own CI and switches its static preset,
  # writing here instead. Confirmed from an actual Netlify build log
  # (2026-07-23): "[nitro] Generated public dist".
  publish = "dist"

[build.environment]
  # ssr: false, WebGL-only SPA — nuxi generate prerenders to plain static
  # files, no Netlify functions involved.
  # Node 20.9 crashes ("styleText is not exported") inside @clack/core — see CLAUDE.md.
  NODE_VERSION = "22"
  # Netlify sets NODE_ENV=production during the build, which makes npm skip
  # devDependencies — but the nuxt CLI itself (plus @vueuse/nuxt,
  # @nuxtjs/tailwindcss) lives there. Without this, `npm run generate` fails
  # before anything is written, because `nuxt` doesn't exist to run it.
  NPM_FLAGS = "--include=dev"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
